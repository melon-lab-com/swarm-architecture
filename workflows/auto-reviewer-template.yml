name: Swarm Auto-Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Swarm Code Reviewer
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.claude/agents
          curl -s https://raw.githubusercontent.com/melon-lab-com/swarm-agents/main/claude-code-agents/code-reviewer.md -o ~/.claude/agents/code-reviewer.md
          
          claude --permission-mode bypassPermissions --print "Use the 'code-reviewer' subagent to review the changes in this PR." > review_output.txt
          
          gh pr comment ${{ github.event.pull_request.number }} -b "$(cat review_output.txt)"
